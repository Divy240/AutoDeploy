<!DOCTYPE html>
<html>
<head>
  <title>DevOps Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }
    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .status {
      color: #22c55e;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🚀 DevOps Project Dashboard</h1>
    <p>Microservices Deployment on AWS</p>

    <h2 class="status">Frontend Running ✅</h2>
    <h2 id="api-data">Connecting to Backend...</h2>

    <p>Deployed on AWS EC2 with Docker</p>
  </div>

  <script>
    fetch("http://34.201.149.215:8000/")
      .then(res => res.json())
      .then(data => {
        document.getElementById("api-data").innerText = "Backend: " + data.message + " ✅";
      })
      .catch(() => {
        document.getElementById("api-data").innerText = "Backend not reachable ❌";
      });
  </script>

</body>
</html>
